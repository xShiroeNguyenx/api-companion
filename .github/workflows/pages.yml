name: Deploy landing page

# Deploy thư mục docs/ (landing page tĩnh) lên GitHub Pages mỗi khi push main
# và có thay đổi trong docs/. Bật Pages: repo Settings → Pages → Source = GitHub Actions.
on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy một deploy tại một thời điểm; không huỷ deploy đang chạy giữa chừng.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload landing page (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
