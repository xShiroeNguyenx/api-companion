name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Hủy run cũ khi có push mới trên cùng ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 trên Linux cần webkit/gtk headers để compile crate src-tauri.
      - name: Install Linux deps (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      # KHÔNG khai version ở đây — action tự đọc từ `packageManager` trong package.json
      # (pnpm@9.15.4). Khai cả hai sẽ gây lỗi "Multiple versions of pnpm specified".
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # Build frontend TRƯỚC cargo test: `tauri::generate_context!` cần thư mục dist tồn tại.
      # Bước này cũng chính là kiểm tra frontend (tsc --noEmit + vite build).
      - name: Build frontend (tsc + vite)
        run: pnpm --filter api-companion-desktop build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cargo test (toàn workspace)
        run: cargo test --workspace --locked
