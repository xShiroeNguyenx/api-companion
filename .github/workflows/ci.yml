name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Hủy run cũ khi có push mới trên cùng ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job NHANH: test toàn bộ crate logic thuần trên Linux (runner nhanh nhất).
  # Loại crate app Tauri (api-companion) → KHÔNG phải compile tauri/webkit → nhanh hơn nhiều
  # và không cần cài GUI deps. Crate app được test riêng ở job `build-app`.
  test:
    name: Test core crates (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # crate `secrets` dùng keyring feature `sync-secret-service` → libdbus-sys (binding C)
      # cần dbus-1 + pkg-config. ubuntu-latest có sẵn libdbus runtime nhưng THIẾU gói -dev.
      - name: Install Linux deps (dbus cho keyring)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (bỏ app Tauri)
        run: cargo test --workspace --exclude api-companion --locked

  # Job CHẬM hơn: build app Tauri thật trên Windows (primary platform) + typecheck FE.
  # Chỉ 1 OS ở CI; macOS/Linux app build được xác thực lúc Release (workflow release.yml).
  build-app:
    name: Build app Tauri (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Action tự đọc pnpm version từ `packageManager` trong package.json (pnpm@9.15.4).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # Build frontend TRƯỚC: `tauri::generate_context!` cần thư mục dist tồn tại lúc compile.
      # Bước này cũng là kiểm tra frontend (tsc --noEmit + vite build).
      - name: Build frontend (tsc + vite)
        run: pnpm --filter api-companion-desktop build

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build + test crate app
        run: cargo test -p api-companion --locked
